<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="container-md">
        <div class="row">
            <div class="col-md-6">
                <select class="form-select m-2">
                    <option value="all">Összes hibajegy</option>
                    <option value="closed">Lezárt hibajegyek</option>
                    <option value="opened">Nyitott hibajegyek</option>
                </select>
            </div>
            <div class="col-md-6">
                <select class="form-select m-2">
                    <option value="all">Összes beküldő</option>
                    <option value="Nagy Eszter">Nagy Eszter</option>
                    <option value="Kiss Géza">Kiss Géza</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <table class="table table-bordered m-2 text-center align-middle">
                    <thead>
                        <tr>
                            <th>Hiba leírása</th>
                            <th>Beküldő</th>
                            <th>Létrehozás ideje</th>
                            <th>Válasz</th>
                            <th>Műveletek</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">

                    </tbody>
                </table>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12 m-2">
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    Új hibajegy rögzítése
                </button>

                <!-- Modal A -->
                <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="exampleModalLabel">Hibajegy rögzítése</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <label class="form-label">Hibajegy leírása</label>
                                <textarea id="inp_desc" class="form-control" rows="5"></textarea>
                                <label class="form-label mt-2">Beküldő neve</label>
                                <input id="inp_user" type="text" class="form-control" />
                            </div>
                            <div class="modal-footer">
                                <button type="button" onclick="add()" data-bs-dismiss="modal" class="btn btn-primary">Mentés</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Modal B -->
                <div class="modal fade" id="exampleModalB" tabindex="-1" aria-labelledby="exampleModalLabel"
                    aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" id="exampleModalLabel">Hibajegy lezárása</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                    aria-label="Close" onclick="clearResponse()"></button>
                            </div>
                            <div class="modal-body">
                                <table class="table table-bordered">
                                    <thead>
                                        <tr>
                                            <th>Leírás</th>
                                            <td id="modalB_description"></td>
                                        </tr>
                                        <tr>
                                            <th>Beküldő</th>
                                            <td id="modalB_user"></td>
                                        </tr>
                                    </thead>
                                </table>
                                <label class="form-label mt-2">Hibajegy lezáró válasz</label>
                                <textarea id="modalB_inp_resp" class="form-control" rows="5"></textarea>
                            </div>
                            <div class="modal-footer">
                                <button id="modalB_closebtn" type="button" data-bs-dismiss="modal" class="btn btn-primary">Mentés</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

</body>

</html>
